spring:
  datasource:
    # jdbc:h2:mem: Nghĩa là database sẽ được lưu tạm trên RAM
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      # create-drop: Tạo bảng trước khi chạy test, xóa sạch bảng khi test xong
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  # Cho phép truy cập giao diện quản trị H2 trên trình duyệt (nếu cần debug)
  h2:
    console:
      enabled: true
      path: /h2-console